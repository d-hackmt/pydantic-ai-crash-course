<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alia Neural Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --accent-primary: #d946ef;
            /* Futuristic Fuchsia */
            --accent-secondary: #06b6d4;
            /* Cyber Cyan */
            --text-color: #f1f5f9;
            --glass-bg: rgba(15, 23, 42, 0.95);
            --neon-shadow: 0 0 25px rgba(217, 70, 239, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image:
                linear-gradient(rgba(217, 70, 239, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 70, 239, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 20% 30%, rgba(217, 70, 239, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
        }

        h1,
        h2,
        h3 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 100px 1fr 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .header {
            grid-column: 1 / span 3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 40px;
            border-radius: 15px;
            box-shadow: var(--neon-shadow);
        }

        .header .title {
            font-size: 2rem;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .panel-title {
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: var(--accent-secondary);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        /* METRICS PANEL */
        .metrics {
            grid-column: 1;
            grid-row: 2 / span 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-primary);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        .progress-bar {
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.5s ease;
        }

        /* CHAT PANEL */
        .chat-container {
            grid-column: 2;
            grid-row: 2 / span 2;
            display: flex;
            flex-direction: column;
        }

        .chat-history {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.4;
            font-size: 1.05rem;
        }

        .msg.alia {
            align-self: flex-start;
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
        }

        .msg.dmt {
            align-self: flex-end;
            background: rgba(0, 255, 255, 0.1);
            border-right: 3px solid var(--accent-secondary);
            text-align: right;
        }

        .msg .sender {
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        /* RIGHT PANEL */
        .side-panels {
            grid-column: 3;
            grid-row: 2 / span 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .text-log {
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #aaa;
        }

        pre {
            font-family: 'Rajdhani', sans-serif;
            white-space: pre-wrap;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 2s infinite;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(217, 70, 239, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <header class="header">
            <div class="title">ALIA // NEURAL DASHBOARD</div>
            <div class="status">
                <span class="live-dot"></span>SYSTEM STABLE // IST: <span id="current-time">00:00:00</span>
            </div>
        </header>

        <aside class="panel metrics">
            <div class="panel-title">Emotional Metrics</div>

            <div class="metric-card">
                <div class="panel-title" style="border:none; color: #888">Affection Score</div>
                <div class="metric-value" id="val-affection">0</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="bar-affection" style="width: 0%"></div>
                </div>
            </div>

            <div class="metric-card" style="border-left-color: var(--accent-secondary)">
                <div class="panel-title" style="border:none; color: #888">Neural Energy</div>
                <div class="metric-value" id="val-energy" style="color: var(--accent-secondary)">0</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="bar-energy" style="width: 0%; background: var(--accent-secondary)">
                    </div>
                </div>
            </div>

            <div class="metric-card" style="border-left-color: #fff">
                <div class="panel-title" style="border:none; color: #888">Current Mood</div>
                <div class="metric-value" id="val-mood" style="font-size: 1.5rem; color: #fff; margin-top: 5px">N/A
                </div>
            </div>
        </aside>

        <main class="panel chat-container">
            <div class="panel-title">Active Stream // DMT <-> ALIA</div>
            <div class="chat-history" id="chat-history">
                <!-- Chat messages will be injected here -->
            </div>
        </main>

        <div class="side-panels">
            <div class="panel" style="flex: 1">
                <div class="panel-title">Private Diary // Reflections</div>
                <div class="text-log" id="log-diary">Connecting to diary nodes...</div>
            </div>
            <div class="panel" style="flex: 1">
                <div class="panel-title">Public Simulacrum // Twitter</div>
                <div class="text-log" id="log-twitter">Fetching public thoughts...</div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/state');
                const state = await response.json();

                // Update Metrics
                document.getElementById('val-affection').innerText = state.heart.affection_level || 50;
                document.getElementById('bar-affection').style.width = (state.heart.affection_level || 50) + '%';

                document.getElementById('val-energy').innerText = state.heart.energy || 100;
                document.getElementById('bar-energy').style.width = (state.heart.energy || 100) + '%';

                document.getElementById('val-mood').innerText = state.heart.mood || "Stable";

                // Update Chat
                const chatHistory = document.getElementById('chat-history');
                chatHistory.innerHTML = '';
                if (state.chat && state.chat.length > 0) {
                    state.chat.forEach(msg => {
                        const div = document.createElement('div');
                        const isAlia = msg.sender.toLowerCase() === 'alia';
                        div.className = `msg ${isAlia ? 'alia' : 'dmt'}`;
                        div.innerHTML = `
                            <div class="sender">${msg.sender} // ${msg.timestamp.split(' ')[1]}</div>
                            ${msg.message}
                        `;
                        chatHistory.appendChild(div);
                    });
                    // Scroll to bottom
                    const container = document.querySelector('.chat-history');
                    container.scrollTop = container.scrollHeight;
                }

                // Update Logs
                document.getElementById('log-diary').innerText = state.diary || "No reflections found.";
                document.getElementById('log-twitter').innerText = state.twitter || "No public musings.";

            } catch (err) {
                console.error("Dashboard Sync Error:", err);
            }
        }

        // Time clock
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }

        setInterval(updateDashboard, 2000);
        setInterval(updateClock, 1000);
        updateDashboard();
    </script>
</body>

</html>
